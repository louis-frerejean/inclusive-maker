<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visuel des gants</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(96vw, 900px);
        background: #111827;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin-top: 0;
        font-size: 1.8rem;
      }
      .status {
        margin: 10px 0 24px;
        font-size: 1.1rem;
        color: #cbd5e1;
      }
      .hand-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(180px, 1fr));
        gap: 18px;
        justify-items: center;
        align-items: center;
        margin-bottom: 20px;
      }
      .hand-card {
        width: 100%;
        max-width: 380px;
        padding: 22px;
        border: 1px solid rgba(147, 197, 253, 0.35);
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(191, 219, 254, 0.95), rgba(147, 197, 253, 0.9));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 8px 20px rgba(37, 99, 235, 0.2);
      }
      .hand-card h2 {
        margin: 0 0 12px;
        font-size: 1.2rem;
        letter-spacing: 0.02em;
        color: #000000;
      }
      .hand-svg {
        width: 100%;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hand-graphic {
        width: 100%;
        height: 100%;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.25));
      }
      .hand.state-ouvrir .hand-graphic {
        background-image: url('images/gants_ouvrir.svg');
      }
      .hand.state-fermer .hand-graphic {
        background-image: url('images/gants_fermer.svg');
      }
      .hand.state-stop .hand-graphic {
        background-image: url('images/gants_stop.svg');
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 22px;
      }
      .control {
        padding: 16px 18px;
        border-radius: 16px;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }
      .control strong {
        display: block;
        font-size: 1rem;
        margin-bottom: 8px;
        color: #e2e8f0;
      }
      .value {
        font-size: 1.35rem;
        font-weight: 700;
      }
      .value.on { color: #34d399; }
      .value.off { color: #f87171; }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .action-pill {
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.1);
        color: #cbd5e1;
        font-size: 1rem;
      }
      .action-pill.active {
        background: #2563eb;
        color: white;
      }
      .legend {
        margin-top: 12px;
        font-size: 0.95rem;
        color: #94a3b8;
      }
      @media (max-width: 640px) {
        .hand-grid {
          grid-template-columns: 1fr;
        }
        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Visuel du gant pneumatique</h1>
      <div class="status" id="status">Attente de la commande…</div>
      <div class="controls">
        <div class="control">
          <strong>État Raspberry</strong>
          <span class="value" id="raspberry-state">Inconnu</span>
        </div>
        <div class="control">
          <strong>Valve</strong>
          <span class="value off" id="valve-state">OFF</span>
        </div>
        <div class="control">
          <strong>Pompe</strong>
          <span class="value off" id="pump-state">OFF</span>
        </div>
      </div>
      <div class="actions" id="actions">
        <span class="action-pill" id="action-ouvrir">ouvrir</span>
        <span class="action-pill" id="action-fermer">fermer</span>
        <span class="action-pill" id="action-stop">stop</span>
      </div>
      <div class="hand-grid">
        <div class="hand-card">
          <h2>Gant gauche</h2>
          <div class="hand-svg hand" id="hand-left">
            <div class="hand-graphic" aria-label="Gant gauche"></div>
          </div>
        </div>
        <div class="hand-card">
          <h2>Gant droit</h2>
          <div class="hand-svg hand" id="hand-right">
            <div class="hand-graphic" aria-label="Gant droit"></div>
          </div>
        </div>
      </div>
      <div class="legend">Le visuel se met à jour automatiquement depuis le Raspberry Pi.</div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const handLeft = document.getElementById('hand-left');
      const handRight = document.getElementById('hand-right');
      const raspberryStateEl = document.getElementById('raspberry-state');
      const valveStateEl = document.getElementById('valve-state');
      const pumpStateEl = document.getElementById('pump-state');
      const actionOuvrir = document.getElementById('action-ouvrir');
      const actionFermer = document.getElementById('action-fermer');
      const actionStop = document.getElementById('action-stop');

      const actionMap = {
        ouvrir: { valve: 'ON', pump: 'OFF' },
        fermer: { valve: 'OFF', pump: 'ON' },
        stop: { valve: 'OFF', pump: 'OFF' },
      };

      async function loadState() {
        try {
          const response = await fetch('../gpio_direct/hand_state.json', { cache: 'no-store' });
          if (!response.ok) throw new Error('Pas de fichier d’état');
          const data = await response.json();
          updateVisual(data);
        } catch (error) {
          statusEl.textContent = 'État non disponible pour le moment.';
          setDefaultState();
        }
      }

      function setDefaultState() {
        raspberryStateEl.textContent = 'Inconnu';
        valveStateEl.textContent = 'OFF';
        valveStateEl.className = 'value off';
        pumpStateEl.textContent = 'OFF';
        pumpStateEl.className = 'value off';
        setActionActive(null);
        handLeft.className = 'hand-svg hand';
        handRight.className = 'hand-svg hand';
      }

      function updateVisual(data) {
        const state = (data.state || 'inconnu').toLowerCase();
        const mapped = actionMap[state] || { valve: 'OFF', pump: 'OFF' };

        statusEl.textContent = `État : ${state} • source : ${data.source || 'inconnue'} • ${data.timestamp || ''}`.trim();
        raspberryStateEl.textContent = state;
        valveStateEl.textContent = mapped.valve;
        valveStateEl.className = `value ${mapped.valve === 'ON' ? 'on' : 'off'}`;
        pumpStateEl.textContent = mapped.pump;
        pumpStateEl.className = `value ${mapped.pump === 'ON' ? 'on' : 'off'}`;

        setActionActive(state);
        handLeft.className = `hand-svg hand state-${state}`;
        handRight.className = `hand-svg hand state-${state}`;
      }

      function setActionActive(state) {
        actionOuvrir.classList.toggle('active', state === 'ouvrir');
        actionFermer.classList.toggle('active', state === 'fermer');
        actionStop.classList.toggle('active', state === 'stop');
      }

      loadState();
      setInterval(loadState, 1000);
    </script>
  </body>
</html>
